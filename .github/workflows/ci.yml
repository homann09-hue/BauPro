name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_ci_dummy
      SUPPLIER_API_ENCRYPTION_KEY: ci-supplier-key-32-byte-minimum
      OPENAI_API_KEY: sk-ci-dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Supabase schema hardening check
        run: npm run db:schema-check

      - name: Build
        run: npm run build
