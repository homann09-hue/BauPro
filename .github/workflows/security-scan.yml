name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --json > audit-report.json
          AUDIT_EXIT=$?
          set -e

          node - "$AUDIT_EXIT" <<'NODE'
          const fs = require("node:fs");

          const auditExitCode = Number(process.argv[2] || "0");
          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const report = JSON.parse(fs.readFileSync("audit-report.json", "utf8"));
          const vulnerabilities = report.metadata?.vulnerabilities ?? {};
          const high = Number(vulnerabilities.high ?? 0);
          const critical = Number(vulnerabilities.critical ?? 0);
          const hasHighCritical = high + critical > 0;

          const advisoryRows = Object.entries(report.vulnerabilities ?? {})
            .filter(([, value]) => value && ["high", "critical"].includes(value.severity))
            .slice(0, 20)
            .map(([name, value]) => `- ${name}: ${value.severity}`);

          const summary = [
            "## npm audit",
            "",
            `- Critical: ${critical}`,
            `- High: ${high}`,
            `- Exit-Code: ${auditExitCode}`,
            "",
            advisoryRows.length > 0 ? advisoryRows.join("\n") : "Keine High/Critical-Funde."
          ].join("\n");

          fs.appendFileSync(outputPath, `audit_exit_code=${auditExitCode}\n`);
          fs.appendFileSync(outputPath, `has_high_critical=${hasHighCritical ? "true" : "false"}\n`);
          fs.appendFileSync(summaryPath, `${summary}\n`);
          NODE

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          if-no-files-found: error

      - name: Create security issue
        if: steps.audit.outputs.has_high_critical == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "security-audit";
            const report = JSON.parse(fs.readFileSync("audit-report.json", "utf8"));
            const vulnerabilities = report.metadata?.vulnerabilities ?? {};
            const high = Number(vulnerabilities.high ?? 0);
            const critical = Number(vulnerabilities.critical ?? 0);

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 1
            });

            if (openIssues.length > 0) {
              core.info(`Offenes ${label}-Issue existiert bereits: ${openIssues[0].html_url}`);
              return;
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: "b60205",
                description: "Automatisch erzeugt durch npm audit"
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            const affected = Object.entries(report.vulnerabilities ?? {})
              .filter(([, value]) => value && ["high", "critical"].includes(value.severity))
              .slice(0, 20)
              .map(([name, value]) => `- ${name}: ${value.severity}`)
              .join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title: `Security audit: ${critical} Critical / ${high} High npm findings`,
              labels: [label],
              body: [
                "Der geplante npm-audit-Scan hat High/Critical-Funde erkannt.",
                "",
                "Bitte binnen 48 Stunden patchen, ersetzen oder eine dokumentierte Mitigation eintragen.",
                "",
                "### Betroffene Pakete",
                affected || "Siehe Artifact `npm-audit-report` im Workflow.",
                "",
                `Workflow: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
              ].join("\n")
            });

      - name: Fail on High/Critical vulnerabilities
        if: steps.audit.outputs.has_high_critical == 'true'
        run: exit 1
